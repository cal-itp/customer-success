name: Netlify MkDocs Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"

jobs:
  mkdocs-deploy-preview:
    name: Deploy Netlify Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # 7.0.0
        with:
          ref: "refs/pull/${{ github.event.number }}/merge"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # 6.3.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: "docs/requirements.txt"

      - name: Build MkDocs website
        run: |
          pip install -r docs/requirements.txt
          mkdocs build

      - name: Install Netlify CLI
        run: npm install --location=global netlify-cli@17.x.x

      # Don't expose secrets to any other process other than the `netlify` cli;
      # don't risk rogue dependencies pulling our secrets
      - name: Deploy Preview to Netlify
        run: |
          netlify deploy \
            --alias="${GITHUB_REPOSITORY#*/}-${{ github.event.number }}" \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --dir="site" \
            --site=${{ secrets.NETLIFY_PREVIEW_APP_SITE_ID }}

      - name: Find existing comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad  # 4.0.0
        id: find-comment
        with:
          issue-number: ${{ github.event.number }}
          comment-author: "github-actions[bot]"
          body-includes: "Preview URL: https://"

      - name: Add Netlify link PR comment
        if: steps.find-comment.outputs.comment-id == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          gh pr comment ${{ github.event.number }} \
            --body "Preview URL: https://${GITHUB_REPOSITORY#*/}-$PR_NUMBER--cal-itp-previews.netlify.app"
